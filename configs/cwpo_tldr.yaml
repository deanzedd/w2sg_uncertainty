# CWPO — Reddit TL;DR experiment
defaults:
  - base

method: cwpo
dataset_name: tldr
labeled_ratio: 0.3

weak_model_name: facebook/opt-125m
strong_model_name: facebook/opt-1.3b

reward_model:
  output_dir: outputs/cwpo/tldr/reward_model

sft:
  output_dir: outputs/cwpo/tldr/sft_strong

training:
  output_dir: outputs/cwpo/tldr/strong_model
  beta: 0.1

weak_label_output_dir: outputs/cwpo/tldr/weak_labels

wandb_run_name: cwpo-tldr-opt125m-opt1.3b
