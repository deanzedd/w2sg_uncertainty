# Baseline DPO — train strong model only on D_l (no weak labeling)
# Use this to compare against WDPO and CWPO
defaults:
  - base

method: baseline_dpo
dataset_name: hh_rlhf 
labeled_ratio: 0.3

strong_model_name: Qwen/Qwen2.5-1.5B
# Alternative strong models:
#   facebook/opt-2.7b        → device_map: null (single GPU, ~5GB)
#   facebook/opt-6.7b        → device_map: auto (multi-GPU)
#   Qwen/Qwen2.5-1.5B        → device_map: null
#   Qwen/Qwen2.5-3B          → device_map: null
#   Qwen/Qwen2.5-7B          → device_map: auto (multi-GPU, needs 4×10GB)

# ── Multi-GPU ──────────────────────────────────────────────────────────────
# Change to: device_map: auto  when using Qwen2.5-7B or OPT-6.7b+
device_map: null

# ── LoRA (paper Bảng 9: r=8, alpha=16, dropout=0.05) ──────────────────────
use_lora: true          # LoRA for strong model SFT and DPO training
lora_r: 8               # LoRA rank per paper spec (Bảng 9)
lora_alpha: 16          # LoRA alpha per paper spec (Bảng 9)
lora_dropout: 0.05      # LoRA dropout per paper spec (Bảng 9)
lora_target_modules: null  # null = PEFT auto-detects (q_proj, v_proj, etc.)

# ── Strong Model SFT ────────────────────────────────────────────────────────
sft:
  output_dir: outputs/baseline_dpo/Qwen2.5-1.5B/hh_rlhf/sft_strong
  num_train_epochs: 3                   # 3 epochs per spec (Bảng 9)
  per_device_train_batch_size: 4        # opt-2.7b: 1 to avoid OOM; grad_accum=8 → eff=8
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4        # effective batch=8 (close to 16 target, limited by VRAM)
  learning_rate: 1.0e-5                 # 1e-5 per spec (Bảng 9)
  lr_scheduler_type: cosine             # cosine per spec (Bảng 9)
  warmup_steps: 100                     # 100 steps per spec (Bảng 9); overrides warmup_ratio
  weight_decay: 0.05                    # 0.05 per spec (Bảng 9)
  optim: paged_adamw_32bit              # paged adamw 32bit per spec (Bảng 9)
  gradient_checkpointing: true          # True per spec (Bảng 9)

training:
  output_dir: outputs/baseline_dpo/Qwen2.5-1.5B/hh_rlhf/strong_model
  num_train_epochs: 5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4   
  learning_rate: 5.0e-6                 # 5e-6 per spec (Bảng 8)
  beta: 0.5                             # 0.5 per spec (Bảng 8)
  weight_decay: 0.05                    # 0.05 per spec
  optim: paged_adamw_32bit              # paged adamw 32bit per spec
  warmup_steps: 100                     # 100 steps per spec
  gradient_checkpointing: true          # True per spec

wandb_run_name: baseline-dpo-hh_rlhf-qwen2.5-1.5b
