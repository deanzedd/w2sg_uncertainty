# Baseline DPO — train strong model only on D_l (no weak labeling)
# Use this to compare against WDPO and CWPO
defaults:
  - base

method: baseline_dpo
dataset_name: hh_rlhf
labeled_ratio: 0.3

strong_model_name: facebook/opt-1.3b
# Alternative strong models:
#   facebook/opt-2.7b        → device_map: null (single GPU, ~5GB)
#   facebook/opt-6.7b        → device_map: auto (multi-GPU)
#   Qwen/Qwen2.5-1.5B        → device_map: null
#   Qwen/Qwen2.5-3B          → device_map: null
#   Qwen/Qwen2.5-7B          → device_map: auto (multi-GPU, needs 4×10GB)

# ── Multi-GPU ──────────────────────────────────────────────────────────────
# Change to: device_map: auto  when using Qwen2.5-7B or OPT-6.7b+
device_map: null

sft:
  output_dir: outputs/baseline_dpo/hh_rlhf/sft_strong
  num_train_epochs: 1                   # 1 epoch for WDPO per spec
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  gradient_checkpointing: false  

training:
  output_dir: outputs/baseline_dpo/hh_rlhf/strong_model
  num_train_epochs: 5
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-5                 # 5e-5 for WDPO standard DPO per spec
  beta: 0.1                             # standard DPO beta per spec
  gradient_checkpointing: false         # set true when device_map: auto

wandb_run_name: baseline-dpo-hh_rlhf-opt1.3b
