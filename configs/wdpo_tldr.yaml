# WDPO — Reddit TL;DR experiment
# Inherits from base.yaml, overrides experiment-specific fields
# Usage: python pipeline/run_pipeline.py --config configs/wdpo_tldr.yaml

defaults:
  - base

method: wdpo
dataset_name: tldr
labeled_ratio: 0.3

weak_model_name: facebook/opt-125m
# WDPO weak model: LM-based implicit reward (SFT → DPO on D_l)
# Qwen2.5-0.5B alternative:
# weak_model_name: Qwen/Qwen2.5-0.5B

strong_model_name: facebook/opt-2.7b
# Alternative strong models:
#   facebook/opt-2.7b        → device_map: null (single GPU, ~5GB)
#   facebook/opt-6.7b        → device_map: auto (multi-GPU)
#   Qwen/Qwen2.5-1.5B        → device_map: null
#   Qwen/Qwen2.5-3B          → device_map: null
#   Qwen/Qwen2.5-7B          → device_map: auto (multi-GPU, needs 4×10GB)

# ── Multi-GPU ──────────────────────────────────────────────────────────────
# Change to: device_map: auto  when using Qwen2.5-7B or OPT-6.7b+
# NOTE: use_lora=true below auto-forces device_map="auto" for PEFT multi-GPU
device_map: null
# device_map is intentionally NOT set here — the code auto-detects:
#   1 GPU  (e.g. 1×120 GB)  → "cuda:0"  (single-card, full model on GPU 0)
#   N GPUs (e.g. 4×10  GB)  → "auto"    (sharded across all available GPUs)
# Override here ONLY if you need to force a specific placement, e.g.:
#   device_map: auto        # force multi-GPU on a single-card machine
#   device_map: "cuda:1"    # force a specific GPU

# ── LoRA (paper Bảng 9: r=8, alpha=16, dropout=0.05) ──────────────────────
use_lora: true          # LoRA for strong model SFT and DPO training
lora_r: 8               # LoRA rank per paper spec (Bảng 9)
lora_alpha: 16          # LoRA alpha per paper spec (Bảng 9)
lora_dropout: 0.05      # LoRA dropout per paper spec (Bảng 9)
lora_target_modules: null  # null = PEFT auto-detects (q_proj, v_proj, etc.)

# ── WDPO Weak Model Phase 1: SFT on D_l (lora_rank=0 per paper Bảng 7) ────
# train_weak_model.py forces use_lora=False for weak model automatically
weak_model_sft:
  output_dir: outputs/wdpo/tldr/weak_model_sft
  num_train_epochs: 5                   # paper Bảng 7: 5 epochs
  per_device_train_batch_size: 16       # paper Bảng 7: 32 (OOM) → 16
  gradient_accumulation_steps: 8        # paper Bảng 7: grad_accum=8
  learning_rate: 1.0e-5                 # paper Bảng 7: 1e-5
  weight_decay: 0.0                     # paper Bảng 7: Adam (không có weight decay)
  warmup_ratio: 0.0                     # paper Bảng 7: không đề cập warmup
  gradient_checkpointing: false

# ── WDPO Weak Model Phase 2: DPO on D_l (lora_rank=0 per paper Bảng 7) ────
# train_weak_model.py forces use_lora=False for weak model automatically
weak_model_dpo:
  output_dir: outputs/wdpo/tldr/weak_model_dpo
  num_train_epochs: 5                   # paper Bảng 7: 5 epochs
  per_device_train_batch_size: 16       # paper Bảng 7: 32 (OOM) → 16
  gradient_accumulation_steps: 8        # paper Bảng 7: grad_accum=8
  learning_rate: 1.0e-5                 # paper Bảng 7: 1e-5
  weight_decay: 0.0                     # paper Bảng 7: Adam (không có weight decay)
  warmup_ratio: 0.0                     # paper Bảng 7: không đề cập warmup
  beta: 0.1                             # standard DPO beta per spec
  gradient_checkpointing: false

# ── Strong Model SFT ────────────────────────────────────────────────────────
sft:
  output_dir: outputs/wdpo/tldr/sft_strong
  num_train_epochs: 3                   # 3 epochs per spec (Bảng 9)
  per_device_train_batch_size: 1        # opt-2.7b: 1 to avoid OOM; grad_accum=8 → eff=8
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8        # effective batch=8 (close to 16 target, limited by VRAM)
  learning_rate: 1.0e-5                 # 1e-5 per spec (Bảng 9)
  lr_scheduler_type: cosine             # cosine per spec (Bảng 9)
  warmup_steps: 100                     # 100 steps per spec (Bảng 9); overrides warmup_ratio
  weight_decay: 0.05                    # 0.05 per spec (Bảng 9)
  optim: paged_adamw_32bit              # paged adamw 32bit per spec (Bảng 9)
  gradient_checkpointing: true          # True per spec (Bảng 9)

# ── Strong Model DPO (Phase 3) ───────────────────────────────────────────────
training:
  output_dir: outputs/wdpo/tldr/strong_model
  num_train_epochs: 5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6                 # 5e-6 per spec (Bảng 8)
  beta: 0.5                             # 0.5 per spec (Bảng 8)
  weight_decay: 0.05                    # 0.05 per spec (Bảng 8)
  optim: paged_adamw_32bit              # paged adamw 32bit per spec (Bảng 8)
  warmup_steps: 100                     # 100 steps per spec (Bảng 8)
  gradient_checkpointing: true          # True per spec (Bảng 8)

weak_label_output_dir: outputs/wdpo/tldr/weak_labels

wandb_run_name: wdpo-tldr-opt125m-opt2.7b
