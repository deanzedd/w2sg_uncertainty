# WDPO — UltraFeedback Binarized (UFB) experiment
# Inherits from base.yaml, overrides experiment-specific fields
# Usage: python pipeline/run_pipeline.py --config configs/wdpo_ufb.yaml

defaults:
  - base

method: wdpo
dataset_name: ufb
labeled_ratio: 0.3

weak_model_name: facebook/opt-125m
strong_model_name: facebook/opt-2.7b
# To run with other strong models, change strong_model_name:
#   facebook/opt-1.3b
#   facebook/opt-2.7b        → device_map: null (single GPU, ~5GB)
#   facebook/opt-6.7b        → device_map: auto (multi-GPU)
#   Qwen/Qwen2.5-1.5B        → device_map: null
#   Qwen/Qwen2.5-3B          → device_map: null
#   Qwen/Qwen2.5-7B          → device_map: auto (multi-GPU, needs 4×10GB)

# ── Multi-GPU ──────────────────────────────────────────────
# Change to: device_map: auto  when using Qwen2.5-7B or OPT-6.7b+
device_map: null

# ── WDPO Weak Model: SFT → DPO on D_l ─────────────────────
# UFB has longer sequences (max 2048 tokens) → smaller batch to fit VRAM
weak_model_sft:
  output_dir: outputs/wdpo/ufb/weak_model_sft
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8        # effective batch = 2×8 = 16
  learning_rate: 1.0e-5
  gradient_checkpointing: false

weak_model_dpo:
  output_dir: outputs/wdpo/ufb/weak_model_dpo
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  beta: 0.1
  gradient_checkpointing: false

# ── Strong Model SFT ────────────────────────────────────────
sft:
  output_dir: outputs/wdpo/ufb/sft_strong
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  gradient_checkpointing: false

# ── Strong Model DPO (Phase 3) ──────────────────────────────
training:
  output_dir: outputs/wdpo/ufb/strong_model
  num_train_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  beta: 0.1
  gradient_checkpointing: false

weak_label_output_dir: outputs/wdpo/ufb/weak_labels

# UFB has longer sequences: override max_length to 2048
max_length: 2048
max_prompt_length: 1024

wandb_run_name: wdpo-ufb-opt125m-opt2.7b
