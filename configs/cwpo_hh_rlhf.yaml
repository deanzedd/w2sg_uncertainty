# CWPO — HH-RLHF experiment
defaults:
  - base

method: cwpo
dataset_name: hh_rlhf
labeled_ratio: 0.3

weak_model_name: facebook/opt-125m
# CWPO weak model: backbone + scalar head (reward model style)
# Qwen2.5-0.5B alternative:
# weak_model_name: Qwen/Qwen2.5-0.5B

strong_model_name: facebook/opt-2.7b
# Alternative strong models:
#   facebook/opt-2.7b        → device_map: null (single GPU, ~5GB)
#   facebook/opt-6.7b        → device_map: auto (multi-GPU)
#   Qwen/Qwen2.5-1.5B        → device_map: null
#   Qwen/Qwen2.5-3B          → device_map: null
#   Qwen/Qwen2.5-7B          → device_map: auto (multi-GPU, needs 4×10GB)

# ── Multi-GPU ──────────────────────────────────────────────────────────────
# Change to: device_map: auto  when using Qwen2.5-7B or OPT-6.7b+
# NOTE: use_lora=true below auto-forces device_map="auto" for PEFT multi-GPU
device_map: null

# ── LoRA (paper Bảng 9: r=8, alpha=16, dropout=0.05) ──────────────────────
use_lora: true          # LoRA for both SFT and DPO strong model training
lora_r: 8               # LoRA rank per paper spec (Bảng 9)
lora_alpha: 16          # LoRA alpha per paper spec (Bảng 9)
lora_dropout: 0.05      # LoRA dropout per paper spec (Bảng 9)
lora_target_modules: null  # null = PEFT auto-detects (q_proj, v_proj, etc.)

# ── Reward Model (CWPO weak annotator, Bradley-Terry loss) ─────────────────
reward_model:
  num_train_epochs: 5
  per_device_train_batch_size: 8         # paper: 32 (OOM), 4×8=32 via grad_accum
  gradient_accumulation_steps: 4         # effective = 4×8 = 32 = paper spec
  learning_rate: 1.0e-5                  # paper spec (Bảng 7)
  weight_decay: 0.0                      # paper Bảng 7: dùng Adam (không có weight decay)
  warmup_ratio: 0.0                      # paper Bảng 7: không đề cập warmup → không dùng
  output_dir: outputs/cwpo/hh_rlhf/reward_model

# ── Strong Model SFT (Phase 1a) ─────────────────────────────────────────────
sft:
  output_dir: outputs/cwpo/hh_rlhf/sft_strong
  num_train_epochs: 3                   # 3 epochs for CWPO per spec (Bảng 9)
  per_device_train_batch_size: 4        # opt-2.7b: 1 to avoid OOM; grad_accum=8 → eff=8
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4        # effective batch=8 (close to 16 target, limited by VRAM)
  learning_rate: 1.0e-5                 # 1e-5 per spec (Bảng 9)
  lr_scheduler_type: cosine             # cosine per spec (Bảng 9)
  warmup_steps: 100                     # 100 steps per spec (Bảng 9); overrides warmup_ratio
  weight_decay: 0.05                    # 0.05 per spec (Bảng 9)
  optim: paged_adamw_32bit              # paged adamw 32bit per spec (Bảng 9)
  gradient_checkpointing: true          # True per spec (Bảng 9)

# ── Strong Model CW-DPO Training (Phase 3) ─────────────────────────────────
training:
  output_dir: outputs/cwpo/hh_rlhf/strong_model
  num_train_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-6                 # 5e-6 for CWPO per spec
  beta: 0.5                             # 0.5 for CWPO per spec
  weight_decay: 0.05                    # 0.05 per spec
  optim: paged_adamw_32bit              # paged adamw 32bit per spec
  warmup_steps: 100                     # 100 steps per spec
  gradient_checkpointing: true          # True per spec

weak_label_output_dir: outputs/cwpo/hh_rlhf/weak_labels

wandb_run_name: cwpo-hh_rlhf-opt125m-opt2.7b
